<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 32" width="64" height="32">
  <!-- Body -->
  <rect x="2" y="8" width="52" height="18" rx="3" fill="currentColor"/>
  <!-- Cab (front-right) -->
  <rect x="42" y="5" width="16" height="21" rx="3" fill="currentColor"/>
  <!-- Windscreen cutout -->
  <rect x="45" y="8" width="10" height="10" rx="1" fill="white" opacity="0.4"/>
  <!-- Side window -->
  <rect x="22" y="11" width="14" height="8" rx="1" fill="white" opacity="0.4"/>
  <!-- Rear wheel -->
  <circle cx="14" cy="26" r="5" fill="#333"/>
  <circle cx="14" cy="26" r="2.5" fill="#888"/>
  <!-- Front wheel -->
  <circle cx="50" cy="26" r="5" fill="#333"/>
  <circle cx="50" cy="26" r="2.5" fill="#888"/>
</svg>
